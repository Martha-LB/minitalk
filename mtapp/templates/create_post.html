{% extends "base.html" %}

{% block content %}

<div class="container">

    <!-- 发帖 -->
    <div class="post-box">
        <form method="post" action="{% url 'create_post' %}">
            {% csrf_token %}

            <textarea name="content" placeholder="What's on your mind?" class="post-textarea"></textarea>

            <div class="post-options">
                <label>
                    <input type="checkbox" name="is_public" checked>
                    Public
                </label>
            </div>

            <div class="post-submit">
                <button class="btn" type="submit">Post</button>
            </div>
        </form>
    </div>

    <!-- 帖子列表 -->
    <p class="section-title">Recent posts:</p>

    {% for post in posts %}
        <div class="post">

            <p class="content">{{ post.content|linebreaksbr }}</p>

            <div class="post-footer">

                <div class="time">
                    <span class="post-time" data-time="{{ post.created_at|date:'c' }}"></span>
                </div>

                <form method="post" action="{% url 'delete_post' post.id %}">
                    {% csrf_token %}
                    <button type="submit" class="delete-btn">delete</button>
                </form>

            </div>

        </div>

    {% empty %}
        <p>No posts yet...</p>
    {% endfor %}

</div>

{% endblock %}
