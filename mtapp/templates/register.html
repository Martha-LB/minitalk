{% extends "auth_base.html" %}

{% block title %}Sign Up - MiniTalk{% endblock %}

{% block content %}

<div class="login-box">  <!-- 👈 这里直接复用 login-box -->
    <h2>Create Account</h2>

    {% if form.errors %}
        <div class="error">
            Please fix the errors below
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required class="form-input">
        <input type="password" name="password1" placeholder="Password" required class="form-input">
        <input type="password" name="password2" placeholder="Confirm Password" required class="form-input">

        <button type="submit" class="auth-btn">Sign Up</button>
    </form>

    <div class="extra">
        Already have an account?
        <a href="{% url 'login' %}">Log in</a>
    </div>
</div>

{% endblock %}
