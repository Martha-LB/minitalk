{% extends "base.html" %}

{% block content %}

<div class="container">
    <div class="post-box">
        <h2>Edit Entry</h2>

        <form method="post">
            {% csrf_token %}

            <textarea name="content" class="edit-textarea">
{{ post.content }}</textarea>

            <div class="visibility">
                <label>
                    <input type="checkbox" name="is_public" {% if post.is_public %}checked{% endif %}>
                    Public
                </label>
            </div>

            <div class="actions">
                <a href="{% url 'post' %}" class="btn cancel-btn">Cancel</a>
                <button type="submit" class="btn save-btn">Save</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
