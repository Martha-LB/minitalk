<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Entry</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
        }

        .navbar {
            background-color: #333;
            color: white;
            padding: 16px 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo a {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: white;
            text-decoration: none;
        }

        .logo a:visited {
            color: white;
        }

        .container {
            width: 600px;
            margin: 60px auto;
        }

        .post-box {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        textarea {
            width: 100%;
            height: 140px;
            border-radius: 10px;
            border: 1px solid #ccc;
            padding: 12px;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }

        .visibility {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 14px;
        }

        .btn {
            padding: 8px 22px;
            border: none;
            border-radius: 999px;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }

        .save-btn {
            background: #4CAF50;
            color: white;
        }

        .save-btn:hover {
            background: #45a049;
        }

        .cancel-btn {
            background: #ddd;
            color: #333;
        }

        .cancel-btn:hover {
            background: #ccc;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">
            <a href="{% url 'home' %}">
                <strong>MiniTalk</strong>
            </a>
        </div>
    </div>

    <div class="container">
        <div class="post-box">
            <h2>Edit Entry</h2>

            <form method="post">
                {% csrf_token %}

                <textarea name="content" placeholder="What's on your mind?">{{ post.content }}</textarea>

                <div class="visibility">
                    <label>
                        <input type="checkbox" name="is_public" {% if post.is_public %}checked{% endif %}>
                        Public
                    </label>
                </div>

                <div class="actions">
                    <a href="{% url 'post' %}" class="btn cancel-btn">Cancel</a>
                    <button type="submit" class="btn save-btn">Save</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
